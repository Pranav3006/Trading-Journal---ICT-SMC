services:
  - type: web
    name: trading-journal
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trading-journal-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: trading-journal-db
    databaseName: trading_journal
    user: trading_user
